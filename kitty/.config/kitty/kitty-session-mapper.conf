tab_bar_filter session:~ or session:^$
map f5 save_as_session --relocatable --use-foreground-process --match=session:. --base-dir ~/.dotfiles/kitty/.config/kitty/sessions
map ctrl+a>n goto_session 1
map ctrl+a>p goto_session -1

map ctrl+a>s>s launch --type=overlay --cwd=current --allow-remote-control bash $HOME/.dotfiles/kitty/.config/kitty/scripts/session-picker.sh
# map ctrl+a>s>s goto_session --sort-by=alphabetical
map ctrl+a>s>. goto_session ~/.dotfiles/dotfiles.kitty-session
map ctrl+a>s>t goto_session ~/.dotfiles/kitty/.config/kitty/sessions/trackit.kitty-session
map ctrl+a>s>c goto_session ~/.dotfiles/kitty/.config/kitty/sessions/comnties.kitty-session

tab_bar_filter session:~

