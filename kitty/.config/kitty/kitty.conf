shell /opt/homebrew/bin/bash

# BEGIN_KITTY_THEME
# Vague
include current-theme.conf
# END_KITTY_THEME

#- System
# map ctrl+a>t kitten toggle_dark_mode.py

#- UI window
tab_bar_edge top
hide_window_decorations titlebar-only
tab_title_template {title}
cursor_trail 1
tab_bar_align left
tab_bar_style separator
tab_separator "  "
# tab_powerline_style angled
macos_option_as_alt right
macos_titlebar_color background


#- UI theme
background_opacity 0.95
background_blur 65

#- third party
allow_remote_control yes
listen_on unix:/tmp/mykitty
# shell_integration no-title

############
# IMPORTANT! only enable this when not using tmux
#
#- Layout
enabled_layouts splits,stack
map ctrl+a>m toggle_layout stack
#
map ctrl+a>| launch --cwd=current --location=vsplit
map ctrl+a>- launch --cwd=current --location=hsplit
#
# ## Move the active window to the indicated screen edge
map ctrl+a>shift+k layout_action move_to_screen_edge top
map ctrl+a>shift+h layout_action move_to_screen_edge left
map ctrl+a>shift+l layout_action move_to_screen_edge right
map ctrl+a>shift+j layout_action move_to_screen_edge bottom
#
# ## Switch focus to the neighboring window in the indicated direction
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+h neighboring_window left
map ctrl+l neighboring_window right
#
# # Unset the mapping to pass the keys to neovim
map --when-focus-on var:IS_NVIM ctrl+j
map --when-focus-on var:IS_NVIM ctrl+k
map --when-focus-on var:IS_NVIM ctrl+h
map --when-focus-on var:IS_NVIM ctrl+l
#
# # the 3 here is the resize amount, adjust as needed
# # map alt+j kitten relative_resize.py down  3
# # map alt+k kitten relative_resize.py up    3
# # map alt+h kitten relative_resize.py left  3
# # map alt+l kitten relative_resize.py right 4
#
# map alt+= resize_window wider 6 --repeat
# map alt+- resize_window narrower 5 --repeat
# map alt+shift+- resize_window shorter 5 --repeat
# map alt+shift+= resize_window taller 5 --repeat
# # map ctrl+a>alt+l resize_window wider 3
#
# map --when-focus-on var:IS_NVIM alt+j
# map --when-focus-on var:IS_NVIM alt+k
# map --when-focus-on var:IS_NVIM alt+h
# map --when-focus-on var:IS_NVIM alt+l
#
# #- Session Management
tab_bar_filter session:~ or session:^$
map f5 save_as_session --relocatable --use-foreground-process --match=session:.
map ctrl+a>n goto_session 1
map ctrl+a>p goto_session -1
#
map ctrl+a>s goto_session --sort-by=alphabetical
map ctrl+a>. goto_session ~/.dotfiles/dotfiles.kitty-session
map ctrl+a>w goto_session ~/Developer/Projects/wear/wear.kitty-session
map ctrl+a>j goto_session ~/Developer/Projects/joyward/joyward.kitty-session
map ctrl+a>g goto_session ~/Developer/Projects/personal/games/games.kitty-session
map ctrl+a>e goto_session ~/Developer/Projects/personal/e-commerce/e-commerce-cna.kitty-session
map ctrl+a>l goto_session ~/Developer/Projects/load2day/l2d.kitty-session
map ctrl+a>t goto_session ~/Developer/Projects/personal/tracker/tracker.kitty-session
map ctrl+a>p goto_session ~/Developer/Projects/personal/promotions/promotions.kitty-session
#
scrollback_pager nvim --cmd 'set eventignore=FileType' +'nnoremap q ZQ' +'set nomodified readonly nolist' +'TermHl' +'$' -
map f1 show_scrollback

#- Tabs managements
map cmd+shift+t launch --cwd=current --type=tab
# map ctrl+a>n next_tab
# map ctrl+a>p prev_tab

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9



# BEGIN_KITTY_FONTS
font_family      family="Monaco"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
